syntax = "proto3";

package v1.auth;

import "buf/validate/validate.proto";

option go_package = "codeberg.org/megakuul/cloudjam/pkg/api/v1/auth";

message LoginRequest {
  string email = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.email = true
  ];
  string password = 2 [(buf.validate.field).required = true];
  bool auto_refresh = 3;
}

message LoginResponse {
  string token = 1;
}

message RegisterRequest {
  string email = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.email = true
  ];
  string code = 2 [(buf.validate.field).required = true];
  string username = 3 [(buf.validate.field).string = {
    min_len: 3
    max_len: 20
  }];
  string password = 4 [(buf.validate.field).string = {
    min_len: 10
    max_len: 100
  }];
}

message RegisterResponse {}

service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse) {}
  rpc Register(RegisterRequest) returns (RegisterResponse) {}
}
