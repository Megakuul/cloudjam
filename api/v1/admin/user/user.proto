syntax = "proto3";

package v1.admin.user;

import "buf/validate/validate.proto";
import "v1/admin/user.proto";

option go_package = "codeberg.org/megakuul/cloudjam/pkg/api/v1/admin/user";

message CreateRequest {
  string username = 1 [(buf.validate.field).string = {min_len: 3, max_len: 20}];
  string email = 2 [(buf.validate.field).string = {email: true}];
  string password = 3 [(buf.validate.field).string = {min_len: 8}];
  Ananas ananas = 4 [(buf.validate.field).required = true];
}

message Ananas {
  map<int64, string> somemap = 1 [(buf.validate.field).map = {
    min_pairs: 1,
    keys: {
      int64: {gte: 0 },
    },
    values: {
      string: {min_len: 3, max_len: 4}
    }
  }];
  repeated string somearray = 2 [(buf.validate.field).repeated = {
    min_items: 1,
    max_items: 3,
    unique: true,
    items: {
      string: {min_len: 3, max_len: 10}
    }
  }];
}

message CreateResponse {
  User user = 1;
}

message GetRequest {
  string id = 1 [(buf.validate.field).string = {uuid: true}];
}

message GetResponse {
  User user = 1;
}

message UpdateRequest {
  string id = 1 [(buf.validate.field).string = {uuid: true}];
  optional string username = 2 [(buf.validate.field).string = {min_len: 3, max_len: 20}];
  optional string email = 3 [(buf.validate.field).string = {email: true}];
}

message UpdateResponse {
  User user = 1;
}

message DeleteRequest {
  string id = 1 [(buf.validate.field).string = {uuid: true}];
}

message DeleteResponse {}

message ListsRequest {
  int32 page_size = 1 [(buf.validate.field).int32 = {gt: 0, lte: 100}];
  string page_token = 2;
}

message ListsResponse {
  repeated User users = 1;
  string next_page_token = 2;
}

service UserService {
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Update(UpdateRequest) returns (UpdateResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc Lists(ListsRequest) returns (ListsResponse);
}
