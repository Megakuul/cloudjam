syntax = "proto3";

package v1.admin;

import "buf/validate/validate.proto";

option go_package = "codeberg.org/megakuul/cloudjam/pkg/api/v1/admin";

message User {
  string id = 1 [(buf.validate.field).string.uuid = true];
  string username = 2 [
    (buf.validate.field).string.min_len = 4,
    (buf.validate.field).string.max_len = 20
  ];
  string description = 3 [
    (buf.validate.field).string.min_len = 0,
    (buf.validate.field).string.max_len = 50
  ];
  string email = 4 [(buf.validate.field).string.email = true];
  int64 created_at = 5;
  double score = 6;
  int64 streak = 7;
  int64 max_streak = 8;
}
