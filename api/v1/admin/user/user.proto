syntax = "proto3";

package v1.admin.user;

import "buf/validate/validate.proto";
import "v1/admin/user.proto";

option go_package = "codeberg.org/megakuul/cloudjam/pkg/api/v1/admin/user";

message CreateRequest {
  string username = 1 [(buf.validate.field).string = {
    min_len: 3
    max_len: 20
  }];
  string email = 2 [(buf.validate.field).string.email = true];
  string password = 3 [(buf.validate.field).string = {
    min_len: 8
    max_len: 100
  }];
}

message CreateResponse {
  User user = 1;
}

message GetRequest {
  string id = 1 [(buf.validate.field).string = {uuid: true}];
}

message GetResponse {
  User user = 1;
}

message UpdateRequest {
  string id = 1 [(buf.validate.field).string = {uuid: true}];
  optional string username = 2 [(buf.validate.field).string = {
    min_len: 3
    max_len: 20
  }];
  optional string email = 3 [(buf.validate.field).string = {email: true}];
}

message UpdateResponse {
  User user = 1;
}

message DeleteRequest {
  string id = 1 [(buf.validate.field).string = {uuid: true}];
}

message DeleteResponse {}

message ListRequest {
  int32 page_size = 1 [(buf.validate.field).int32 = {
    gt: 0
    lte: 100
  }];
  string page_token = 2;
}

message ListResponse {
  repeated User users = 1;
  string next_page_token = 2;
}

service UserService {
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Update(UpdateRequest) returns (UpdateResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc List(ListRequest) returns (ListResponse);
}
